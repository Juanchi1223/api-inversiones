spring.application.name=api-inversiones
server.port=${PORT:8080}

# --- Datasource (Supabase / PostgreSQL - Session Pooler) ---
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# El schema se gestiona manualmente en Supabase (docs/schema.sql)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Spring Batch ---
# Todavia no hay jobs; no inicializar metadata tables al arrancar
spring.batch.jdbc.initialize-schema=never

# --- Actuator ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
